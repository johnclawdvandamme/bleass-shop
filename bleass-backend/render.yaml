services:
  - type: web
    name: bleass-backend
    env: node
    buildCommand: npm run build
    startCommand: node .medusa/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bleass-db
          property: connectionString
    rootDir: bleass-backend